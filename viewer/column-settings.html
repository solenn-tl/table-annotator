<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Column Settings</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Segoe UI, system-ui, -apple-system, sans-serif;
    }

    body {
      margin: 0;
      padding: 16px;
      background: Canvas;
      color: CanvasText;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    button {
      padding: 6px 10px;
      font: inherit;
      color: inherit;
      background: transparent;
      border: 1px solid #7776;
      border-radius: 6px;
      cursor: pointer;
    }

    #status {
      color: GrayText;
      font-size: 13px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      border: 1px solid #7774;
      padding: 6px 8px;
      text-align: left;
    }

    th {
      background: color-mix(in oklab, Canvas 96%, black 4%);
    }

    input,
    select {
      width: 100%;
      font: inherit;
      color: inherit;
      background: transparent;
      border: 1px solid #7776;
      border-radius: 4px;
      padding: 4px 6px;
      box-sizing: border-box;
    }

    .remove-cell {
      width: 56px;
      text-align: center;
    }

    .remove-btn {
      padding: 2px 8px;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <label for="imageFormatSelect">Image format</label>
    <select id="imageFormatSelect" style="width:180px;">
      <option value="single">single</option>
      <option value="double" selected>double</option>
    </select>
    <button id="addRowBtn" type="button">Add column rule</button>
    <button id="saveBtn" type="button">Save settings</button>
    <button id="reloadBtn" type="button">Reload</button>
    <a href="/" style="text-decoration:none;"><button type="button">Back to annotation</button></a>
    <span id="status"></span>
  </div>

  <table>
    <thead>
      <tr>
        <th>Column</th>
        <th>Type</th>
        <th class="remove-cell">Remove</th>
      </tr>
    </thead>
    <tbody id="rulesBody"></tbody>
  </table>

  <script>
    const rulesBody = document.getElementById('rulesBody');
    const addRowBtn = document.getElementById('addRowBtn');
    const saveBtn = document.getElementById('saveBtn');
    const reloadBtn = document.getElementById('reloadBtn');
    const status = document.getElementById('status');
    const imageFormatSelect = document.getElementById('imageFormatSelect');

    const typeOptions = [
      { value: 'none', label: 'None' },
      { value: 'sequence', label: 'Fill sequence only' },
      { value: 'autocomplete', label: 'Autocomplete only' },
      { value: 'both', label: 'Fill sequence + Autocomplete' },
    ];

    function setStatus(message) {
      status.textContent = message;
    }

    function createTypeSelect(initialValue = 'both') {
      const select = document.createElement('select');
      for (const optionData of typeOptions) {
        const option = document.createElement('option');
        option.value = optionData.value;
        option.textContent = optionData.label;
        select.append(option);
      }
      select.value = initialValue;
      return select;
    }

    function appendRuleRow(columnName = '', columnType = 'both') {
      const tr = document.createElement('tr');

      const nameTd = document.createElement('td');
      const nameInput = document.createElement('input');
      nameInput.type = 'text';
      nameInput.value = columnName;
      nameInput.placeholder = 'Column name';
      nameTd.append(nameInput);
      tr.append(nameTd);

      const typeTd = document.createElement('td');
      typeTd.append(createTypeSelect(columnType));
      tr.append(typeTd);

      const removeTd = document.createElement('td');
      removeTd.className = 'remove-cell';
      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'remove-btn';
      removeBtn.textContent = '✕';
      removeBtn.addEventListener('click', () => {
        tr.remove();
      });
      removeTd.append(removeBtn);
      tr.append(removeTd);

      rulesBody.append(tr);
    }

    async function loadSettings() {
      const response = await fetch('/api/column-settings', { cache: 'no-store' });
      if (!response.ok) {
        if (response.status === 404) {
          rulesBody.innerHTML = '';
          appendRuleRow('', 'both');
          imageFormatSelect.value = 'double';
          setStatus('Loaded defaults (column-settings.json not found)');
          return;
        }
        throw new Error(`Load failed (${response.status})`);
      }

      const payload = await response.json();
      const imageFormat = payload?.imageFormat === 'single' || payload?.imageFormat === 'double'
        ? payload.imageFormat
        : 'double';
      const columnTypes = payload?.columnTypes && typeof payload.columnTypes === 'object'
        ? payload.columnTypes
        : {};

      imageFormatSelect.value = imageFormat;

      rulesBody.innerHTML = '';

      const entries = Object.entries(columnTypes);
      if (!entries.length) {
        appendRuleRow('', 'both');
      } else {
        for (const [columnName, columnType] of entries) {
          appendRuleRow(String(columnName), String(columnType));
        }
      }

      setStatus('Loaded settings');
    }

    function collectPayload() {
      const columnTypes = {};
      for (const tr of rulesBody.querySelectorAll('tr')) {
        const nameInput = tr.querySelector('td:nth-child(1) input');
        const typeSelect = tr.querySelector('td:nth-child(2) select');

        if (!nameInput || !typeSelect) {
          continue;
        }

        const name = nameInput.value.trim();
        if (!name) {
          continue;
        }

        if (columnTypes[name]) {
          throw new Error(`Duplicate column: ${name}`);
        }

        columnTypes[name] = typeSelect.value;
      }

      const imageFormat = imageFormatSelect.value === 'single' ? 'single' : 'double';
      return { imageFormat, columnTypes };
    }

    async function saveSettings() {
      const payload = collectPayload();

      const response = await fetch('/api/column-settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload, null, 2),
      });

      if (!response.ok) {
        throw new Error(`Save failed (${response.status})`);
      }

      setStatus('Saved settings');
    }

    addRowBtn.addEventListener('click', () => {
      appendRuleRow('', 'both');
    });

    saveBtn.addEventListener('click', async () => {
      try {
        await saveSettings();
      } catch (error) {
        setStatus(error.message || 'Save failed');
      }
    });

    reloadBtn.addEventListener('click', async () => {
      try {
        await loadSettings();
      } catch (error) {
        setStatus(error.message || 'Load failed');
      }
    });

    loadSettings().catch((error) => {
      setStatus(error.message || 'Load failed');
    });
  </script>
</body>
</html>
